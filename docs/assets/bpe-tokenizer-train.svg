<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-label="BPE tokenizer training flow">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .label { font: 700 17px Arial, sans-serif; fill: #111827; }
      .small { font: 15px Arial, sans-serif; fill: #374151; }
      .tiny { font: 13px Arial, sans-serif; fill: #6b7280; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .a { fill: #eff6ff; stroke: #3b82f6; }
      .b { fill: #ecfdf5; stroke: #10b981; }
      .c { fill: #fffbeb; stroke: #f59e0b; }
      .d { fill: #fdf2f8; stroke: #ec4899; }
      .e { fill: #f5f3ff; stroke: #8b5cf6; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #7c3aed; stroke-width: 2.5; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow-purple); }
      .code { font: 14px Menlo, Consolas, monospace; fill: #1f2937; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="500"/>
  <text class="title" x="44" y="54">训练 BPE: 从 corpus 学 merge 规则</text>
  <text class="small" x="44" y="84">训练阶段不在本项目实现；运行时只读取训练好的 vocab.json 和 merges.txt。</text>

  <rect class="box a" x="52" y="132" width="180" height="120"/>
  <text class="label" x="74" y="168">1. Corpus</text>
  <text class="small" x="74" y="200">大量文本样本</text>
  <text class="tiny" x="74" y="226">代码、中文、英文...</text>

  <rect class="box b" x="282" y="132" width="190" height="120"/>
  <text class="label" x="304" y="168">2. 初始切分</text>
  <text class="small" x="304" y="200">byte / char symbols</text>
  <text class="code" x="304" y="226">l o w e r</text>

  <rect class="box c" x="522" y="132" width="210" height="120"/>
  <text class="label" x="544" y="168">3. 统计相邻 pair</text>
  <text class="small" x="544" y="200">按频次排序</text>
  <text class="code" x="544" y="226">(l,o), (o,w), ...</text>

  <rect class="box d" x="782" y="132" width="210" height="120"/>
  <text class="label" x="804" y="168">4. 合并最高频 pair</text>
  <text class="small" x="804" y="200">加入 vocab 和 merges</text>
  <text class="code" x="804" y="226">l + o -&gt; lo</text>

  <rect class="box e" x="332" y="328" width="250" height="112"/>
  <text class="label" x="354" y="364">重复直到目标 vocab size</text>
  <text class="small" x="354" y="396">merge 顺序就是 rank</text>
  <text class="tiny" x="354" y="420">rank 越小，encode 时越优先</text>

  <rect class="box" x="690" y="328" width="250" height="112"/>
  <text class="label" x="712" y="364">训练产物</text>
  <text class="small" x="712" y="396">vocab.json</text>
  <text class="small" x="712" y="420">merges.txt</text>

  <path class="arrow" d="M232 192 L282 192"/>
  <path class="arrow" d="M472 192 L522 192"/>
  <path class="arrow" d="M732 192 L782 192"/>
  <path class="loop" d="M886 252 C866 326, 620 326, 578 362"/>
  <path class="arrow" d="M582 384 L690 384"/>
</svg>
